<h2 id="equazioni-alle-derivate-parziali">Equazioni alle derivate parziali</h2>
<ul>
<li data-marpit-fragment="1">La <strong>fisica</strong> ha sempre studiato i fenomeni naturali e ha cercato di descriverli in strumenti matematici.</li>
<li data-marpit-fragment="2">I <strong>modelli</strong> sono approssimazioni matematiche della descrizione dei fenomeni naturali, per un singolo fenomeno diversi livelli di approssimazione possono portare a diversi modelli.</li>
<li data-marpit-fragment="3">Le <strong>equazioni alle derivate parziali</strong> (PDE) sono strumenti che hanno permesso di descrivere molti fenomeni fisici.</li>
<li data-marpit-fragment="4">La <strong>matematica</strong> fornisce gli strumenti per studiare ed analizzare le equazioni che descrivono i modelli fisici.</li>
<li data-marpit-fragment="5">L'<strong>analisi numerica</strong> approssima le soluzioni di queste equazioni quando soluzioni analitiche non sono disponibili.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-marpit-fragments="8" data-paginate="true" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="19" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;img/motivational_collage.png&quot;);background-size:75%;"></figure></div></section></foreignObject><foreignObject width="50%" height="720"><section id="11" data-marpit-fragments="8" data-paginate="true" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="19" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2 id="applicazioni-delle-pde">Applicazioni delle PDE</h2>

<ul>
<li data-marpit-fragment="1">Diffusione di calore</li>
<li data-marpit-fragment="2">Elasticità e deformazione di solidi</li>
<li data-marpit-fragment="3">Vibrazioni</li>
<li data-marpit-fragment="4">Fluidi: acqua, gas, meteo</li>
<li data-marpit-fragment="5">Interazione fluidi-strutture</li>
<li data-marpit-fragment="6">Diffusione di agenti biologici/inquinanti</li>
<li data-marpit-fragment="7">Elettro-magnetismo</li>
<li data-marpit-fragment="8">Combinazioni di questi</li>
</ul>
</section>

<h1 id="metodi-numerici">Metodi Numerici</h1>
<p>Trovare soluzioni esatte di PDE non è sempre facile, in particolare se:</p>
<ul>
<li data-marpit-fragment="1">la geometria del dominio <mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="1.633ex" height="1.593ex" role="img" focusable="false" viewBox="0 -704 722 704"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="mi"><path data-c="3A9" d="M55 454Q55 503 75 546T127 617T197 665T272 695T337 704H352Q396 704 404 703Q527 687 596 615T666 454Q666 392 635 330T559 200T499 83V80H543Q589 81 600 83T617 93Q622 102 629 135T636 172L637 177H677V175L660 89Q645 3 644 2V0H552H488Q461 0 456 3T451 20Q451 89 499 235T548 455Q548 512 530 555T483 622T424 656T361 668Q332 668 303 658T243 626T193 560T174 456Q174 380 222 233T270 20Q270 7 263 0H77V2Q76 3 61 89L44 175V177H84L85 172Q85 171 88 155T96 119T104 93Q109 86 120 84T178 80H222V83Q206 132 162 199T87 329T55 454Z"></path></g></g></g></svg></mjx-container> è complicata (ponti, aerei, etc.),</li>
<li data-marpit-fragment="2">le equazioni sono complicate (nonlinearità, ordini alti, etc.).</li>
</ul>
<p>L'analisi numerica fornisce strumenti per la risoluzione delle PDE. Vari metodi, ma più o meno tutti seguono queste procedure:</p>
<ol>
<li>Discretizzazione del dominio</li>
<li>Discretizzazione dello spazio delle funzioni dove cerco la soluzione</li>
<li>Discretizzazione delle equazioni (il metodo numerico vero e proprio)</li>
<li>Risoluzione delle equazioni discretizzate</li>
</ol>
</section>

<h1 id="alcuni-metodi-numerici">Alcuni Metodi Numerici</h1>
<p>Nel tempo numerosi metodi numerici sono stati sviluppati (alcuni più specifici per alcune applicazioni, altri più generici)</p>
<ul>
<li data-marpit-fragment="1">Finite Difference (FD)</li>
<li data-marpit-fragment="2">Finite Volume (FV)</li>
<li data-marpit-fragment="3">Galerkin approximations:
<ul>
<li data-marpit-fragment="4">Continous Finite Elements (FEM)</li>
<li data-marpit-fragment="5">Discontinuous Galerkin (DG)</li>
<li data-marpit-fragment="6">Spectral Methods</li>
<li data-marpit-fragment="7">Spectral Element Methods (SEM)</li>
<li data-marpit-fragment="8">Summation by parts (SBP)</li>
</ul>
</li>
<li data-marpit-fragment="9">Physics Informed Neural Networks (PINN)</li>
</ul>
</section>
